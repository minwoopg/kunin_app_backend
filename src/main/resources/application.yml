server:
  port: 8080

spring:
  application:
    name: kunin-backend

  # ─────────────────────────────────────────
  #  MySQL 연결 정보 - 본인 환경에 맞게 수정하세요
  # ─────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/kunin?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: root
    password: 5425
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop   # 개발용: 재시작마다 테이블 재생성 + data.sql 재실행
    show-sql: true
    defer-datasource-initialization: true  # data.sql을 엔티티 생성 이후 실행
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false       # open-in-view 경고 제거

  sql:
    init:
      mode: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# ─────────────────────────────────────────
#  JWT 설정
#  secret: 최소 32자 이상의 랜덤 문자열 (실제 배포 시 환경변수로 관리)
# ─────────────────────────────────────────
jwt:
  secret: KIP2026-kunin-backend-jwt-secret-key-minimum-32chars
  expiration-ms: 86400000   # 24시간 (ms)

logging:
  level:
    org.hibernate.SQL: debug
