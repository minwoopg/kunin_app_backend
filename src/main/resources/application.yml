server:
  port: 8080

spring:
  application:
    name: kunin-backend

  # ─────────────────────────────────────────
  #  MySQL 연결 정보 - 본인 환경에 맞게 수정하세요
  # ─────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/kunin?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop   # 개발용: 재시작마다 테이블 재생성 + data.sql 재실행
    show-sql: true
    defer-datasource-initialization: true  # data.sql을 엔티티 생성 이후 실행
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.hibernate.SQL: debug
